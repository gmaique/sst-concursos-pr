<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4b4770">
  <title>SST Concursos PR — Eng. Segurança do Trabalho</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <section id="view-inicio" class="view"></section>
    <section id="view-sessao" class="view" hidden></section>
    <section id="view-plano" class="view" hidden></section>
    <section id="view-temas" class="view" hidden></section>
    <section id="view-simulado" class="view" hidden></section>
    <section id="view-perfil" class="view" hidden></section>
  </main>
  <nav class="nav-inferior">
    <button data-view="view-inicio" class="nav-btn">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9h14v-9"/><path d="M10 19v-5h4v5"/></svg>
      <span>Início</span></button>
    <button data-view="view-plano" class="nav-btn">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
      <span>Plano</span></button>
    <button data-view="view-temas" class="nav-btn">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 3 6.5v13L9 17l6 2.5 6-2.5v-13L15 6.5 9 4z"/><path d="M9 4v13M15 6.5v13"/></svg>
      <span>Temas</span></button>
    <button data-view="view-simulado" class="nav-btn">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l4 4v14H6z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg>
      <span>Simulado</span></button>
    <button data-view="view-perfil" class="nav-btn">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 20v-3M12 20v-9M19 20v-6"/><path d="M3 20h18"/></svg>
      <span>Perfil</span></button>
  </nav>
  <script type="module" src="app.js"></script>
</body>
</html>
